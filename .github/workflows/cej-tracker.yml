name: cej-tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: cej-tracker
  cancel-in-progress: false

jobs:
  track-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cej-tracker/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: cej-tracker
        run: npm ci

      - name: Run tracker
        working-directory: cej-tracker
        env:
          CEJ_SEARCH_URL: ${{ secrets.CEJ_SEARCH_URL }}
          CEJ_DISCORD_WEBHOOK_URL: ${{ secrets.CEJ_DISCORD_WEBHOOK_URL }}
          CEJ_DISCORD_USERNAME: ${{ vars.CEJ_DISCORD_USERNAME || 'CEJ Tracker' }}
          CEJ_DISCORD_AVATAR_URL: ${{ vars.CEJ_DISCORD_AVATAR_URL }}
          CEJ_DISCORD_MENTION_USER_ID: ${{ secrets.CEJ_DISCORD_MENTION_USER_ID }}
          CEJ_DISCORD_MENTION_ROLE_ID: ${{ secrets.CEJ_DISCORD_MENTION_ROLE_ID }}
          LOG_LEVEL: info
        run: npm run track

      - name: Build static site
        working-directory: cej-tracker
        env:
          CEJ_SEARCH_URL: ${{ secrets.CEJ_SEARCH_URL }}
          CEJ_PUBLIC_SITE_URL: ${{ vars.CEJ_PUBLIC_SITE_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run build-site

      - name: Commit tracker state
        run: |
          if git diff --quiet -- cej-tracker/data; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cej-tracker/data
          git commit -m "chore: update CEJ tracker data"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cej-tracker/site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
