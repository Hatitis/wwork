services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sdp
      POSTGRES_PASSWORD: sdp
      POSTGRES_DB: sdp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__SdpDb: Host=postgres;Port=5432;Database=sdp;Username=sdp;Password=sdp
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  web:
    build:
      context: .
      dockerfile: src/Web/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ApiBaseUrl: http://api:8080
    ports:
      - "8081:8081"
    depends_on:
      - api

volumes:
  postgres_data:
